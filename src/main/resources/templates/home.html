<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Vibes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="top-nav">
        <a href="/home" class="brand-logo">
            <span style="background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✨ Vibes</span>
        </a>
        <div class="nav-links">
            <a href="/home" class="nav-item active">Beranda</a>
            <a href="/gallery" class="nav-item">Eksplor</a>
            <a href="/form" class="nav-item">Posting</a>
            <a href="/about" class="nav-item">Profil</a>
            <a href="/logout" class="nav-item logout">Keluar</a>
        </div>
    </nav>

    <div class="main-container">
        <div th:if="${#lists.isEmpty(posts)}" style="text-align: center; padding: 5rem 1rem; color: var(--text-muted);">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📷</div>
            <h2>Belum ada postingan di lini masa.</h2>
            <p style="margin-top: 0.5rem;">Jadilah yang pertama untuk membagikan sesuatu!</p>
        </div>

        <div class="feed-grid">
            <div class="post-card" th:each="post : ${posts}">
                <div class="post-header">
                    <img src="/images/me.jpeg" alt="Avatar" class="avatar">
                    <div>
                        <div class="post-author" th:text="${post.author}">User</div>
                        <div class="post-time" th:text="${post.formattedTime}">Baru saja</div>
                    </div>
                </div>
                
                <img th:if="${post.photoBase64 != null}" 
                     th:src="${'data:' + post.contentType + ';base64,' + post.photoBase64}" 
                     alt="Post image" class="post-image">
                     
                <div class="post-body">
                    <div class="post-content">
                        <strong th:text="${post.author}" style="color: var(--primary); margin-right: 5px;">User</strong>
                        <span th:text="${post.content}">Status keren di sini.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
