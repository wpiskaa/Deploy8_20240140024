<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posting Baru - Vibes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="top-nav">
        <a href="/home" class="brand-logo">
            <span style="background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✨ Vibes</span>
        </a>
        <div class="nav-links">
            <a href="/home" class="nav-item">Beranda</a>
            <a href="/gallery" class="nav-item">Eksplor</a>
            <a href="/form" class="nav-item active">Posting</a>
            <a href="/about" class="nav-item">Profil</a>
            <a href="/logout" class="nav-item logout">Keluar</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="form-card">
            <h2 style="margin-bottom: 2rem; color: var(--text-main);">Buat Postingan Baru</h2>
            
            <form method="post" th:action="@{/form}" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="author" class="form-control" value="admin" required readonly style="background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed;" />
                </div>

                <div class="form-group">
                    <label class="form-label">Pilih Foto (Maksimal 10MB)</label>
                    <div style="border: 2px dashed var(--border-color); padding: 3rem 2rem; text-align: center; border-radius: var(--radius-md); background: rgba(0,0,0,0.2);">
                        <input type="file" name="file" accept="image/*" required style="width: 100%; color: var(--text-main);" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Tulis Status</label>
                    <textarea name="content" class="form-control" placeholder="Apa yang sedang kamu pikirkan?" required></textarea>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <a href="/home" class="btn btn-outline" style="flex: 1;">Batal</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Bagikan</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
