<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Vibes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="top-nav">
        <a href="/home" class="brand-logo">
            <span style="background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✨ Vibes</span>
        </a>
        <div class="nav-links">
            <a href="/home" class="nav-item">Beranda</a>
            <a href="/gallery" class="nav-item">Eksplor</a>
            <a href="/form" class="nav-item">Posting</a>
            <a href="/about" class="nav-item active">Profil</a>
            <a href="/logout" class="nav-item logout">Keluar</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="profile-header">
            <img src="/images/me.jpeg" alt="Profil Saya" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; background: var(--gradient-primary); padding: 4px;">
            
            <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <div>
                        <h2 style="font-size: 2rem; color: var(--text-main); margin-bottom: 0.2rem;">Hafiz Kurniawan</h2>
                        <div style="color: var(--primary); font-weight: 500;">@admin</div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <a href="#" class="btn btn-outline">Edit Profil</a>
                    </div>
                </div>

                <div style="display: flex; gap: 2rem; margin-bottom: 1.5rem;">
                    <div><strong style="color: var(--text-main);">24</strong> <span style="color: var(--text-muted);">Postingan</span></div>
                    <div><strong style="color: var(--text-main);">1.2M</strong> <span style="color: var(--text-muted);">Pengikut</span></div>
                    <div><strong style="color: var(--text-main);">10</strong> <span style="color: var(--text-muted);">Mengikuti</span></div>
                </div>

                <div style="color: var(--text-muted); line-height: 1.6;">
                    <strong>Mahasiswa Teknologi Informasi</strong><br>
                    Membuat kenangan melalui kode dan lensa. 📸💻<br>
                    Membangun sistem dan desain antarmuka.
                </div>
            </div>
        </div>

        <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; color: var(--text-main);">Postingan Saya</h3>
        
        <div class="explore-grid-desktop">
            <div th:each="post : ${posts}" th:if="${post.photoBase64 != null}" class="explore-item">
                <img th:src="${'data:' + post.contentType + ';base64,' + post.photoBase64}" class="explore-image" alt="My photo">
            </div>
            
            <!-- Fallback dummy images if empty -->
            <div th:if="${#lists.isEmpty(posts)}" class="explore-item"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" class="explore-image"></div>
            <div th:if="${#lists.isEmpty(posts)}" class="explore-item"><img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=600&q=80" class="explore-image"></div>
        </div>
    </div>
</body>
</html>
