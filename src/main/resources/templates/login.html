<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Vibes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✨</div>
                <h1 style="margin-bottom: 0.5rem; color: var(--text-main);">Vibes Portal</h1>
                <p style="color: var(--text-muted);">Silakan masuk untuk melanjutkan.</p>
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan username" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Masukkan password" required />
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                    Login
                </button>
            </form>

            <p class="error" th:if="${error}" th:text="${error}" 
               style="color: #ef4444; text-align: center; margin-top: 1.5rem; font-weight: 500;"></p>
               
            <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem;">
                &copy; 2024 Vibes Network
            </div>
        </div>
    </div>
</body>
</html>
